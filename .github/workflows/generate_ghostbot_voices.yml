name: Generate GhostBot Voices (One-Time)

# This allows you to manually trigger the workflow from the Actions tab
on:
  workflow_dispatch: 

jobs:
  generate_and_commit:
    runs-on: ubuntu-latest
    
    # Required so the bot can push the new audio files back to your repository
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Required Library
        run: |
          pip install google-genai

      - name: Run Voice Generation Script
        env:
          # Pulls your existing secret to authenticate with the API
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_ghostbot_voices.py

      - name: Commit and Push Voice Files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add the newly generated voices folder
          git add voices/
          
          # Only commit if there are actually new files to avoid workflow errors
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: auto-generated GhostBot base voice clones"
          git push
