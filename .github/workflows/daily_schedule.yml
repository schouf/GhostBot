name: Daily GhostBot Upload
on:
  schedule:
    - cron: '0 6,18 * * *'
  workflow_dispatch:

concurrency:
  group: ghostbot-upload
  cancel-in-progress: false

jobs:
  run_bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install System Dependencies & Fix Permissions
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libsndfile1 sox imagemagick fonts-liberation ghostscript \
                                   libwebp-dev libjpeg-dev zlib1g-dev libfreetype6-dev
          
          # BRUTE FORCE FIX: Remove ImageMagick policy completely to allow MoviePy text rendering
          sudo rm -f /etc/ImageMagick-6/policy.xml
          
          mkdir -p assets temp images downloads sfx music
          chmod -R 777 assets temp images downloads sfx music

      - name: Install Python Libraries
        run: |
          python -m pip install --upgrade pip
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          
          pip install google-api-python-client requests Pillow scipy moviepy opencv-python-headless imageio[ffmpeg] imageio[pyav]
          
          pip install -r requirements.txt

      - name: Run GhostBot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }} 
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          SEARCH_API_KEY: ${{ secrets.SEARCH_API_KEY }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
          # THE TITANIUM PIPELINE SECRETS
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python main.py

      - name: Debug Visuals (Verify Image Downloads)
        if: always()
        run: |
          echo "=== CHECKING DOWNLOADED/GENERATED IMAGES ==="
          ls -lh temp_img_*.jpg 2>/dev/null || echo "No temp images found"
          
          echo "=== CHECKING FILE TYPES ==="
          file temp_img_*.jpg 2>/dev/null || true
          
          echo "=== CHECKING IMAGE SIZES ==="
          for img in temp_img_*.jpg; do
            if [ -f "$img" ]; then
              size=$(stat -c%s "$img" 2>/dev/null)
              echo "$img: $size bytes"
            fi
          done

      - name: Commit and Push Memory Bank Updates
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add topics.txt
          
          if git diff --staged --quiet; then
            echo "No changes in topics.txt to commit."
          else
            git commit -m "chore: update topics memory bank [skip ci]"
            git pull --rebase origin main || true
            git push
          fi
