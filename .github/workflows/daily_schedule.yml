name: Daily GhostBot Upload

on:
  schedule:
    # Runs at 06:00 and 18:00 UTC (approx Morning/Evening)
    - cron: '0 6,18 * * *'
  workflow_dispatch: # Allows manual trigger button

jobs:
  run_bot:
    runs-on: ubuntu-latest
    # INCREASED TIMEOUT TO 6 HOURS
    timeout-minutes: 360 
    
    # NEW: Grants the action permission to push code back to the repo
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libsndfile1 sox imagemagick fonts-liberation
          sudo sed -i 's/<policy domain="path" rights="none" pattern="@\*"//' /etc/ImageMagick-6/policy.xml

      - name: Install Python Libraries
        run: |
          pip install -r requirements.txt

      - name: Run GhostBot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          # --- SECRETS FOR FACEBOOK & INSTAGRAM ---
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
        run: python main.py

      - name: Commit and Push Memory Bank Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage the topics file
          git add topics.txt
          
          # Commit only if there are changes (prevents action from failing if no new video was made)
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update topics memory bank [skip ci]"
          
          # Push back to the main branch
          git push
